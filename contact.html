<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/css/style.css">
<style>
  .contact-layout {
    max-width: 800px;
    margin: 80px auto;
    padding: 0 20px;
    font-family: 'Inter', sans-serif;
    color: #374151;
    line-height: 1.7;
    text-align: center;
    min-height: 50vh;
  }
  .contact-layout h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    color: #111827;
    margin-bottom: 24px;
  }
  .contact-layout p {
    font-size: 18px;
    color: #4B5563;
    margin-bottom: 40px;
  }
  .contact-box {
    background: white;
    border: 1px solid #EAEAEA;
    border-radius: 12px;
    padding: 48px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
  }
  .email-link {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #2563EB;
    text-decoration: none;
    padding: 16px 32px;
    background: #EFF6FF;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .email-link:hover {
    background: #DBEAFE;
  }
</style>
</head>
<body>

{{> header }}

<main class="contact-layout">
  <h1>Contact Support</h1>
  <p>Need help with your license, or have a question about how FileLocker works? Our team is here to assist you.</p>

  <div class="contact-box">
    <h3 style="margin-bottom: 16px; font-family: 'Space Grotesk', sans-serif; font-size: 20px;">Email Us Directly</h3>
    <p style="font-size: 15px; margin-bottom: 32px;">We typically respond to all support inquiries within 24 business hours.</p>
    <a href="mailto:support@filelocker.com" class="email-link">support@filelocker.com</a>
  </div>
</main>

{{> footer }}

</body>
</html>
