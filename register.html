<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="/src/css/style.css">
<style>
  body { margin: 0; min-height: 100vh; display: flex; font-family: 'Inter', sans-serif; }
  
  .split-left { flex: 1; background: #0F172A; color: white; padding: 60px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .split-right { flex: 1; background: white; display: flex; align-items: center; justify-content: center; padding: 40px; }
  
  /* Abstract background pattern for left side */
  .bg-pattern { position: absolute; inset: 0; opacity: 0.1; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px; }
  
  .auth-container { width: 100%; max-width: 400px; }
  .auth-header { margin-bottom: 32px; }
  .auth-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; margin-bottom: 8px; color: #111827; letter-spacing: -0.02em; font-weight: 700; }
  .auth-form .form-group { margin-bottom: 20px; }
  .auth-form label { display: block; font-size: 13px; font-weight: 600; color: #4B5563; margin-bottom: 8px; }
  .auth-form input { width: 100%; padding: 14px 16px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; transition: all 0.2s; }
  .auth-form input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  .auth-form button { width: 100%; padding: 14px; background: #2563EB; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .auth-form button:hover:not(:disabled) { background: #1D4ED8; }
  .auth-form button:disabled { opacity: 0.7; cursor: not-allowed; }
  .auth-footer { margin-top: 24px; font-size: 14px; color: #6B7280; }
  .auth-footer a { color: #2563EB; text-decoration: none; font-weight: 500; }
  #errorMsg { color: #991B1B; font-size: 14px; margin-bottom: 20px; display: none; padding: 12px 16px; background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 8px; align-items: flex-start; gap: 12px; font-weight: 500; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  #errorMsg.show { display: flex; }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    .split-left { display: none; }
    .split-right { padding: 40px 20px; }
  }
</style>
</head>
<body>

<div class="split-left">
  <div class="bg-pattern"></div>
  <div style="position: relative; z-index: 10;">
    <a href="/" style="display: inline-block;">
      <img src="/logo/filelocker-logo-main-dark.svg" alt="FileLocker Logo" height="40" style="display: block;">
    </a>
  </div>
  
  <div style="position: relative; z-index: 10;">
    <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 48px; line-height: 1.1; margin-bottom: 24px; letter-spacing: -0.02em; color: white;">Military-grade encryption. <br>Zero installation.</h2>
    <p style="font-size: 20px; color: rgba(255,255,255,0.8); line-height: 1.5; max-width: 480px;">Secure your sensitive files directly onto any USB drive before they ever leave your computer.</p>
  </div>
</div>

<div class="split-right">
  <div class="auth-container">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p style="color: #6B7280; font-size: 16px;">Get started with FileLocker</p>
    </div>
    
    <div id="errorMsg"></div>

    <!-- Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="613015066802-e22l5s2va9man9d4hcsrrg44od6ks044.apps.googleusercontent.com"
         data-context="signup"
         data-ux_mode="popup"
         data-callback="handleGoogleSignIn"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signup_with"
         data-size="large"
         data-logo_alignment="left"
         style="margin-bottom: 20px; display: flex; justify-content: center;">
    </div>
    
    <div style="text-align: center; margin: 20px 0; color: #9CA3AF; font-size: 14px; position: relative;">
      <span style="background: white; padding: 0 10px; position: relative; z-index: 1;">Or continue with email</span>
      <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid #E5E7EB; z-index: 0;"></div>
    </div>

    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label for="password">Create Password</label>
        <input type="password" id="password" required placeholder="••••••••" minlength="6">
      </div>
      <button type="submit" id="submitBtn">Continue to Payment</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('fl_token')) window.location.href = '/';
  
  const isBuy = new URLSearchParams(window.location.search).get('buy') === 'true';
  if (!isBuy) document.getElementById('submitBtn').textContent = 'Create Account';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    
    errorMsg.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';
    
    const showError = (msg) => {
      errorMsg.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink: 0; margin-top: 1px;"><path d="M12 8V12M12 16H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>${msg}</span>`;
      errorMsg.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = isBuy ? 'Continue to Payment' : 'Create Account';
    };

    try {
      const res = await fetch('https://filelocker-license-server.qaisarifdhukka.workers.dev/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        // Save auth token
        localStorage.setItem('fl_token', data.token);
        
        if (isBuy) {
          // Redirect to Lemon Squeezy with user_id and email prefilled
          const checkoutUrl = new URL('https://filelocker.lemonsqueezy.com/checkout/buy/b303a8ae-4fc6-4f16-83ed-0c1159e02b8a');
          checkoutUrl.searchParams.set('checkout[email]', email);
          checkoutUrl.searchParams.set('checkout[custom][user_id]', data.userId);
          window.location.href = checkoutUrl.toString();
        } else {
          window.location.href = '/';
        }
      } else {
        showError(data.error || 'Registration failed');
      }
    } catch (err) {
      showError('Network error. Is the server running?');
    }
  });

  async function handleGoogleSignIn(response) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.remove('show');
    
    const showError = (msg) => {
      errorMsg.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink: 0; margin-top: 1px;"><path d="M12 8V12M12 16H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>${msg}</span>`;
      errorMsg.classList.add('show');
    };

    try {
      const res = await fetch('https://filelocker-license-server.qaisarifdhukka.workers.dev/api/google-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('fl_token', data.token);
        
        if (isBuy) {
          const jwtPayload = JSON.parse(atob(response.credential.split('.')[1]));
          const checkoutUrl = new URL('https://filelocker.lemonsqueezy.com/checkout/buy/b303a8ae-4fc6-4f16-83ed-0c1159e02b8a');
          checkoutUrl.searchParams.set('checkout[email]', jwtPayload.email);
          checkoutUrl.searchParams.set('checkout[custom][user_id]', data.userId);
          window.location.href = checkoutUrl.toString();
        } else {
          window.location.href = '/';
        }
      } else {
        showError(data.error || 'Google Sign-In failed');
      }
    } catch (err) {
      showError('Network error. Is the server running?');
    }
  }
</script>
</body>
</html>
