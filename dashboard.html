<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/css/style.css">
<style>
  body { background: #F9FAFB; }
  .dashboard-content { max-width: 900px; margin: 60px auto; padding: 0 20px; min-height: 60vh; }
  .dashboard-header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
  .dashboard-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 40px; color: #0A0A12; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.02em; }
  .dashboard-header p { color: #6B7280; font-size: 18px; line-height: 1.5; margin: 0; }
  
  .download-btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 24px; background: #2563EB; color: white; border-radius: 8px; font-weight: 600; font-size: 15px; text-decoration: none; transition: background 0.2s; font-family: 'Inter', sans-serif; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2); }
  .download-btn:hover { background: #1D4ED8; }
  
  .license-card { background: white; border: 1px solid #EAEAEA; border-radius: 12px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.02); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; transition: box-shadow 0.2s; }
  .license-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.04); }
  
  .license-info h3 { font-family: 'Space Grotesk', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #6B7280; font-weight: 700; margin-bottom: 8px; }
  .license-key { font-family: 'Space Grotesk', monospace; font-size: 28px; color: #111827; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; }
  
  .status-badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; }
  .status-active { background: #DCFCE7; color: #166534; }
  .status-unused { background: #F3F4F6; color: #4B5563; }
  
  .action-btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; border: 1px solid #D1D5DB; background: white; color: #374151; transition: all 0.2s; font-family: 'Inter', sans-serif; }
  .action-btn:hover:not(:disabled) { background: #F9FAFB; border-color: #9CA3AF; }
  
  .empty-state { text-align: center; padding: 60px; background: white; border-radius: 12px; border: 1px dashed #D1D5DB; }
  .empty-state h3 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; color: #111827; margin-bottom: 12px; font-weight: 600; }
  .empty-state p { color: #6B7280; margin-bottom: 32px; font-size: 16px; }
  .empty-state .btn-primary { display: inline-block; padding: 14px 28px; background: #2563EB; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .empty-state .btn-primary:hover { background: #1D4ED8; }
</style>
</head>
<body>

{{> header }}

<div class="dashboard-content">
  <div class="dashboard-header">
    <div>
      <h1>Your Licenses</h1>
      <p>Manage your FileLocker software keys and active devices.</p>
    </div>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
      <a href="https://github.com/qaisarifdhukka-code/filelocker-website/releases/download/v1.0.0/FileLocker-Setup.exe" class="download-btn" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download App for Windows
      </a>
      <p style="font-size: 12px; color: #9CA3AF; max-width: 250px; text-align: right; line-height: 1.4; margin: 0;">
        <strong>Note:</strong> If Windows shows a security popup during install, click "More Info" -> "Run Anyway".
      </p>
    </div>
  </div>
  
  <div id="licenseContainer">
    <div style="text-align: center; color: #6B7280; padding: 40px; font-size: 16px;">Loading your licenses...</div>
  </div>
</div>

{{> footer }}

<script>
  // Check auth
  const token = localStorage.getItem('fl_token');
  if (!token) window.location.href = 'login.html';

  async function loadLicenses() {
    try {
      const res = await fetch('https://filelocker-license-server.onrender.com/api/licenses', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('fl_token');
        window.location.href = 'login.html';
        return;
      }
      
      const licenses = await res.json();
      const container = document.getElementById('licenseContainer');
      
      if (licenses.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Active Licenses</h3>
            <p>You haven't purchased FileLocker yet.</p>
            <a href="pricing.html" class="btn-primary">Buy FileLocker</a>
          </div>
        `;
        return;
      }

      container.innerHTML = licenses.map(lic => {
        const isUsed = !!lic.used_by_hardware_id;
        const statusClass = isUsed ? 'status-active' : 'status-unused';
        const statusText = isUsed ? 'Active on a machine' : 'Unused';
        
        return `
          <div class="license-card">
            <div class="license-info">
              <h3>Pro License Key</h3>
              <div class="license-key">${lic.license_key}</div>
              <div class="status-badge ${statusClass}">
                <span style="display:inline-block; width:6px; height:6px; border-radius:50%; background:currentColor; margin-right:6px; opacity:0.8;"></span>
                ${statusText}
              </div>
              ${isUsed ? `<div style="margin-top:16px; font-size:13px; color:#9CA3AF; font-family:monospace;">Machine ID: ${lic.used_by_hardware_id}</div>` : ''}
            </div>
            <div>
              ${isUsed 
                ? `<button class="action-btn" onclick="unlinkMachine('${lic.license_key}')">Unlink Machine</button>`
                : `<button class="action-btn" style="opacity:0.5; cursor:not-allowed;" disabled>Unlink Machine</button>`
              }
            </div>
          </div>
        `;
      }).join('');
      
    } catch (err) {
      console.error(err);
      document.getElementById('licenseContainer').innerHTML = '<div style="color:red; text-align:center; padding: 40px; background: white; border-radius: 12px; border: 1px solid #fecaca;">Error loading licenses. Is the server running?</div>';
    }
  }

  async function unlinkMachine(licenseKey) {
    if (!confirm('Are you sure you want to unlink this machine? It will no longer be able to use FileLocker until re-activated.')) return;
    
    try {
      const res = await fetch('https://filelocker-license-server.onrender.com/api/unlink', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ licenseKey })
      });
      
      if (res.ok) {
        alert('Machine unlinked successfully! You can now use this key on a new computer.');
        loadLicenses();
      } else {
        const data = await res.json();
        alert('Error: ' + data.error);
      }
    } catch (err) {
      alert('Network error.');
    }
  }

  loadLicenses();
</script>
</body>
</html>
