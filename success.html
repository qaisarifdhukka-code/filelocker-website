<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/css/style.css">
<style>
  body { margin: 0; min-height: 100vh; display: flex; font-family: 'Inter', sans-serif; }
  
  .split-left { flex: 1; background: #0F172A; color: white; padding: 60px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .split-right { flex: 1; background: white; display: flex; align-items: center; justify-content: center; padding: 40px; }
  
  /* Abstract background pattern for left side */
  .bg-pattern { position: absolute; inset: 0; opacity: 0.1; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px; }
  
  .auth-container { width: 100%; max-width: 440px; }
  .auth-header { margin-bottom: 40px; }
  .auth-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 36px; margin-bottom: 12px; color: #111827; letter-spacing: -0.02em; font-weight: 700; }
  
  .success-icon { display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; background: #D1FAE5; margin-bottom: 24px; }
  
  .license-box { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 32px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
  .license-label { font-size: 11px; font-weight: 700; color: #4B5563; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
  
  .key-input { width: 100%; font-family: 'Space Grotesk', monospace; font-size: 16px; font-weight: 600; text-align: center; padding: 16px; border: 2px dashed #D1D5DB; border-radius: 8px; background: #F9FAFB; color: #111827; outline: none; transition: all 0.2s; margin-bottom: 24px; letter-spacing: 0.05em; }
  .key-input:focus { border-color: #2563EB; background: white; }
  
  #copyBtn { width: 100%; padding: 16px; background: #2563EB; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  #copyBtn:hover { background: #1D4ED8; }
  #copyBtn.copied { background: #10B981; }
  
  #dashboardLink { display: none; margin-top: 32px; text-align: center; }
  #dashboardLink a { color: #4B5563; text-decoration: none; font-weight: 500; font-size: 15px; transition: color 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  #dashboardLink a:hover { color: #111827; }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    .split-left { display: none; }
    .split-right { padding: 40px 20px; }
  }
</style>
</head>
<body>

<div class="split-left">
  <div class="bg-pattern"></div>
  <div style="position: relative; z-index: 10;">
    <a href="/" style="display: inline-block;">
      <img src="/logo/filelocker-logo-main-dark.svg" alt="FileLocker Logo" height="40" style="display: block;">
    </a>
  </div>
  
  <div style="position: relative; z-index: 10;">
    <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 48px; line-height: 1.1; margin-bottom: 24px; letter-spacing: -0.02em; color: white;">Military-grade encryption. <br>Zero installation.</h2>
    <p style="font-size: 20px; color: rgba(255,255,255,0.8); line-height: 1.5; max-width: 480px;">Secure your sensitive files directly onto any USB drive before they ever leave your computer.</p>
  </div>
</div>

<div class="split-right">
  <div class="auth-container">
    
    <div class="success-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    
    <div class="auth-header">
      <h1>Payment Successful!</h1>
      <p id="subtitle" style="color: #6B7280; font-size: 16px; line-height: 1.5;">We're verifying your payment and generating your License Key...</p>
    </div>
    
    <div class="license-box">
      <div class="license-label">Your Pro License Key</div>
      <input type="text" id="licenseKey" class="key-input" readonly value="Generating...">
      
      <button id="copyBtn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M8 16H6C4.89543 16 4 15.1046 4 14V6C4 4.89543 4.89543 4 6 4H14C15.1046 4 16 4.89543 16 6V8M10 8H18C19.1046 8 20 8.89543 20 10V18C20 19.1046 19.1046 20 18 20H10C8.89543 20 8 19.1046 8 18V10C8 8.89543 8.89543 8 10 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Copy License Key</span>
      </button>
      
      <div id="dashboardLink">
        <a href="dashboard.html">
          Go to my Dashboard
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('orderId');
  const token = localStorage.getItem('fl_token');

  const copyBtn = document.getElementById('copyBtn');
  const keyInput = document.getElementById('licenseKey');
  const subtitle = document.getElementById('subtitle');
  const dashboardLink = document.getElementById('dashboardLink');
  
  if (token) {
    dashboardLink.style.display = 'block';
  }

  async function checkLicense(retries = 0) {
    if (!token) {
      subtitle.textContent = "You are not logged in.";
      keyInput.value = "ERROR";
      return;
    }
    try {
      const res = await fetch(`https://filelocker-license-server.onrender.com/api/licenses`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.ok) {
        const licenses = await res.json();
        if (licenses.length > 0) {
          const data = licenses[licenses.length - 1].license_key;
          keyInput.value = data;
          subtitle.textContent = "Your software is ready to activate.";
          copyBtn.disabled = false;
          
          copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(data);
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = `
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <span>Copied to Clipboard!</span>
            `;
            setTimeout(() => {
              copyBtn.classList.remove('copied');
              copyBtn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M8 16H6C4.89543 16 4 15.1046 4 14V6C4 4.89543 4.89543 4 6 4H14C15.1046 4 16 4.89543 16 6V8M10 8H18C19.1046 8 20 8.89543 20 10V18C20 19.1046 19.1046 20 18 20H10C8.89543 20 8 19.1046 8 18V10C8 8.89543 8.89543 8 10 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>Copy License Key</span>
              `;
            }, 3000);
          });
          return;
        }
      }
      
      // If no license found yet, retry
      if (retries < 15) {
        setTimeout(() => checkLicense(retries + 1), 2000);
      } else {
        subtitle.textContent = "Your payment is taking longer than usual to verify. Please check your dashboard in a few minutes.";
        keyInput.value = "PENDING";
      }
    } catch (err) {
      if (retries < 15) {
        setTimeout(() => checkLicense(retries + 1), 2000);
      } else {
        subtitle.textContent = "Network error. Please try refreshing the page.";
        keyInput.value = "ERROR";
      }
    }
  }

  checkLicense();
</script>
</body>
</html>
