<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/css/style.css">
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; background: #0F172A; position: relative; overflow: hidden; }
  
  /* Abstract background pattern */
  .bg-pattern { position: absolute; inset: 0; opacity: 0.05; background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px; z-index: 0; }
  
  .auth-container { position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 48px; background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
  
  .success-icon { display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: #ECFDF5; border-radius: 50%; margin: 0 auto 24px; }
  
  .auth-header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; margin-bottom: 8px; color: #111827; letter-spacing: -0.02em; font-weight: 700; }
  .auth-header p { color: #6B7280; font-size: 16px; line-height: 1.5; margin: 0; }
  
  .loader { margin: 32px auto; border: 3px solid #F3F4F6; border-top: 3px solid #2563EB; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  
  #credentialsBox { display: none; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 12px; padding: 24px; text-align: left; margin-top: 32px; }
  .credentials-label { font-size: 12px; font-weight: 700; color: #64748B; margin-bottom: 8px; text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }
  
  .key-input { width: 100%; padding: 16px; border: 1px solid #CBD5E1; border-radius: 8px; font-family: 'Space Grotesk', monospace; font-size: 18px; font-weight: 600; background: white; text-align: center; color: #0F172A; margin-bottom: 16px; letter-spacing: 1px; outline: none; transition: border-color 0.2s; }
  .key-input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  
  #copyBtn { width: 100%; padding: 14px; background: #2563EB; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #copyBtn:hover { background: #1D4ED8; }
  #copyBtn.copied { background: #10B981; }
  
  #dashboardLink { display: none; margin-top: 32px; }
  #dashboardLink a { color: #4B5563; text-decoration: none; font-weight: 500; transition: color 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  #dashboardLink a:hover { color: #111827; }

  @media (max-width: 600px) {
    .auth-container { padding: 32px 24px; margin: 24px; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="auth-container" id="mainContainer">
  
  <img src="/logo/filelocker-logo-main.svg" alt="FileLocker Logo" height="32" style="margin-bottom: 32px; display: block; margin-left: auto; margin-right: auto;">

  <div class="success-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17L4 12" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  
  <div class="auth-header">
    <h1>Payment Successful!</h1>
    <p id="subtitle">We're verifying your payment and generating your License Key...</p>
  </div>
  
  <div id="loadingState">
    <div class="loader"></div>
  </div>
  
  <div id="errorMsg" style="color: #EF4444; display: none; margin-top: 24px; font-weight: 500; padding: 12px; background: #FEF2F2; border-radius: 8px; border: 1px solid #FCA5A5;"></div>

  <div id="credentialsBox">
    <div class="credentials-label">Your Pro License Key</div>
    <input type="text" id="displayKey" readonly class="key-input" value="••••••••••••••••">
    
    <button id="copyBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      <span>Copy License Key</span>
    </button>
  </div>
  
  <div id="dashboardLink">
    <a href="dashboard.html">Go to my Dashboard <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
  </div>
</div>

<script>
  const token = localStorage.getItem('fl_token');
  const errorMsg = document.getElementById('errorMsg');
  const credentialsBox = document.getElementById('credentialsBox');
  const loadingState = document.getElementById('loadingState');
  const dashboardLink = document.getElementById('dashboardLink');

  if (!token) {
    errorMsg.textContent = 'You are not logged in. Please log in to view your license key.';
    errorMsg.style.display = 'block';
    loadingState.style.display = 'none';
  } else {
    let attempts = 0;
    const maxAttempts = 15;
    
    async function fetchLicense() {
      try {
        const res = await fetch('https://filelocker-license-server.onrender.com/api/licenses', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (res.ok) {
          const licenses = await res.json();
          if (licenses.length > 0) {
            document.getElementById('displayKey').value = licenses[licenses.length - 1].license_key;
            document.getElementById('subtitle').textContent = 'Your software is ready to activate.';
            
            loadingState.style.display = 'none';
            credentialsBox.style.display = 'block';
            dashboardLink.style.display = 'block';
            return;
          }
        }
      } catch (err) {
        console.error('Fetch error:', err);
      }
      
      attempts++;
      if (attempts < maxAttempts) {
        setTimeout(fetchLicense, 2000);
      } else {
        loadingState.style.display = 'none';
        errorMsg.textContent = 'Payment takes a little longer to verify. Please check your Dashboard in a minute.';
        errorMsg.style.display = 'block';
        dashboardLink.style.display = 'block';
      }
    }
    
    fetchLicense();
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    const key = document.getElementById('displayKey').value;
    navigator.clipboard.writeText(key);
    
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17L4 12"/></svg> <span>Copied!</span>';
    
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> <span>Copy License Key</span>';
    }, 2000);
  });
</script>
</body>
</html>
