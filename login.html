<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FileLocker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,480;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/css/style.css">
<style>
  .auth-container { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border: 1px solid #EAEAEA; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
  .auth-header { text-align: center; margin-bottom: 32px; }
  .auth-header h1 { font-size: 24px; margin-bottom: 8px; color: #111827; }
  .auth-form .form-group { margin-bottom: 20px; }
  .auth-form label { display: block; font-size: 13px; font-weight: 600; color: #4B5563; margin-bottom: 8px; }
  .auth-form input { width: 100%; padding: 12px 16px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none; transition: all 0.2s; }
  .auth-form input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
  .auth-form button { width: 100%; padding: 14px; background: #2563EB; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .auth-form button:hover { background: #1D4ED8; }
  .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: #6B7280; }
  .auth-footer a { color: #2563EB; text-decoration: none; font-weight: 500; }
  #errorMsg { color: #EF4444; font-size: 14px; margin-bottom: 16px; text-align: center; display: none; }
</style>
</head>
<body style="background: #F9FAFB; min-height: 100vh; display: flex; align-items: center; justify-content: center;">

<div class="auth-container">
  <div class="auth-header">
    <h1>Sign In</h1>
    <p style="color: #6B7280; font-size: 15px;">Welcome back to FileLocker</p>
  </div>
  
  <div id="errorMsg"></div>

  <form class="auth-form" id="loginForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit">Sign In</button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Create one</a>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    
    try {
      const res = await fetch('https://filelocker-license-server.onrender.com/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('fl_token', data.token);
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = data.error || 'Login failed';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Network error. Is the server running?';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
